networks:
  camunda:
    driver: bridge

services:
  camunda-data-init:
    image: camunda/camunda:8.9.0
    user: "0:0"
    entrypoint: [ "/bin/sh", "-c", "chown -R 1001:1001 /usr/local/camunda/camunda-data && chmod 775 /usr/local/camunda/camunda-data" ]
    volumes:
    - camunda-data:/usr/local/camunda/camunda-data
    restart: "no"
  camunda:
    image: camunda/camunda:8.9.0
    container_name: camunda
    ports:
    - "26500:26500"
    - "9600:9600"
    - "8080:8080"
    environment:
    - JAVA_TOOL_OPTIONS="-XX:+PrintFlagsFinal"
    mem_limit: 1g
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && echo -e \"GET /actuator/health/status HTTP/1.1\r\nHost: localhost\r\n\r\n\" >&3 && head -n 1 <&3'"]
      interval: 1s
      retries: 30
      start_period: 30s
    volumes:
    - camunda:/usr/local/camunda/data
    - camunda-data:/usr/local/camunda/camunda-data
    configs:
    - source: orchestration-config
      target: /usr/local/camunda/config/application.yaml
    networks:
    - camunda
    depends_on:
      camunda-data-init:
        condition: service_completed_successfully
  script-connector-runtime:
    container_name: script-connector-runtime
    image: ghcr.io/camunda-community-hub/script-connector/runtime:latest
    environment:
      - CAMUNDA_CLIENT_GRPCADDRESS=http://camunda:26500
      - CAMUNDA_CLIENT_RESTADDRESS=http://camunda:8080
      - management.endpoints.web.exposure.include=health
      - management.endpoint.health.probes.enabled=true
    depends_on:
      camunda:
        condition: service_healthy
    networks:
      - camunda
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health/readiness" ]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s
  script-connector-bundled:
    container_name: script-connector-bundled
    image: camunda/connectors-bundle:8.9.0
    environment:
    - CAMUNDA_CLIENT_GRPCADDRESS=http://camunda:26500
    - CAMUNDA_CLIENT_RESTADDRESS=http://camunda:8080
    - CAMUNDA_CONNECTOR_POLLING_ENABLED=false
    - CAMUNDA_CONNECTOR_WEBHOOK_ENABLED=false
    - SPRING_MAIN_WEB-APPLICATION-TYPE=none
    - management.endpoints.web.exposure.include=health
    - management.endpoint.health.probes.enabled=true
    - JAVA_OPTS=-Dloader.path=/opt/test/
    depends_on:
      camunda:
        condition: service_healthy
    networks:
    - camunda
    volumes:
    - ./../connector/target/script-connector-2.2.1-SNAPSHOT-shaded.jar:/opt/test/script-connector.jar
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health/readiness" ]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s
volumes:
  camunda:
  camunda-data:
configs:
  orchestration-config:
    file: ./camunda/application.yaml